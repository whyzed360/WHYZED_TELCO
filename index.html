<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHYZED Digital Network</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <div class="phone-container">
        <header>
            <h2>WHYZED VNP</h2>
            <div class="status-bar">
                <span id="network-status" class="status offline">Connecting...</span>
            </div>
        </header>

        <main>
            <div class="identity-box">
                <label>Your Secure Number:</label>
                <div id="my-id-display" class="number-display">Generating...</div>
            </div>

            <div class="dialer-screen">
                <input type="text" id="destination-number" placeholder="060-xxx-xxx" maxlength="11">
            </div>

            <div class="action-buttons">
                <button id="btn-call" class="btn call-btn" onclick="initiateVoiceCall()">📞 START CALL</button>
                <button id="btn-hangup" class="btn hangup-btn hidden" onclick="endVoiceCall()">❌ HANG UP</button>
            </div>
            
            <div class="call-info">
                <p id="call-state">System Idle</p>
            </div>
        </main>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
